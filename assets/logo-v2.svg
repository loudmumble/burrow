<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="pipeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a6e3a1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#74c7ec;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Technical blueprint background -->
  <rect width="400" height="400" fill="#11111b"/>
  
  <!-- Blueprint grid -->
  <g stroke="#1e1e2e" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/><line x1="0" y1="300" x2="400" y2="300"/>
    <line x1="0" y1="350" x2="400" y2="350"/>
    <line x1="50" y1="0" x2="50" y2="400"/><line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="250" y1="0" x2="250" y2="400"/><line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="350" y1="0" x2="350" y2="400"/>
  </g>
  
  <!-- Pipe network -->
  <g stroke="url(#pipeGrad)" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main horizontal -->
    <line x1="50" y1="200" x2="350" y2="200"/>
    <!-- Vertical branches -->
    <line x1="100" y1="100" x2="100" y2="300"/>
    <line x1="200" y1="80" x2="200" y2="320"/>
    <line x1="300" y1="100" x2="300" y2="300"/>
    <!-- Diagonal connections -->
    <line x1="100" y1="100" x2="200" y2="80"/>
    <line x1="200" y1="80" x2="300" y2="100"/>
    <line x1="100" y1="300" x2="200" y2="320"/>
    <line x1="200" y1="320" x2="300" y2="300"/>
  </g>
  
  <!-- Junction nodes -->
  <g fill="#1e1e2e" stroke="#a6e3a1" stroke-width="3">
    <circle cx="100" cy="200" r="10"/>
    <circle cx="200" cy="200" r="12"/>
    <circle cx="300" cy="200" r="10"/>
    <circle cx="100" cy="100" r="8"/>
    <circle cx="200" cy="80" r="8"/>
    <circle cx="300" cy="100" r="8"/>
    <circle cx="100" cy="300" r="8"/>
    <circle cx="200" cy="320" r="8"/>
    <circle cx="300" cy="300" r="8"/>
  </g>
  
  <!-- Data flow arrows -->
  <g fill="#f9e2af">
    <polygon points="150,195 160,200 150,205"/>
    <polygon points="250,195 240,200 250,205"/>
    <polygon points="95,150 100,140 105,150"/>
    <polygon points="95,250 100,260 105,250"/>
  </g>
  
  <!-- Transport labels -->
  <g fill="#6c7086" font-family="monospace" font-size="7">
    <text x="100" y="70" text-anchor="middle">TCP/TLS</text>
    <text x="200" y="60" text-anchor="middle">WEBSOCKET</text>
    <text x="300" y="70" text-anchor="middle">DNS</text>
    <text x="100" y="340" text-anchor="middle">ICMP</text>
    <text x="200" y="355" text-anchor="middle">HTTP</text>
    <text x="300" y="340" text-anchor="middle">SOCKS5</text>
  </g>
  
  <!-- Active tunnel indicator -->
  <circle cx="200" cy="200" r="20" fill="none" stroke="#f9e2af" stroke-width="2">
    <animate attributeName="r" values="20;30;20" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Text -->
  <text x="200" y="385" text-anchor="middle" fill="#a6e3a1" font-family="monospace" font-size="28" font-weight="bold" letter-spacing="6">BURROW</text>
</svg>